name: Update Snake Color

on:
  schedule:
    - cron: "0 */12 * * *" # Ejecutar cada 12 horas
  workflow_dispatch: # Permitir ejecución manual

jobs:
  update-snake:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Paso 2: Descargar el archivo languages.yml
      - name: Download Linguist Languages
        run: |
          curl -o languages.yml https://raw.githubusercontent.com/github/linguist/master/lib/linguist/languages.yml

      # Paso 3: Obtener el lenguaje que más utilizas y extraer su color
      - name: Extract Top Language Color
        id: extract_color
        run: |
          # Tu lenguaje principal (puedes reemplazarlo dinámicamente en el futuro)
          TOP_LANGUAGE=$(curl -s "https://api.github.com/users/${{ github.actor }}/repos" | jq -r '.[] | .language' | sort | uniq -c | sort -nr | head -n 1 | awk '{print $2}')
          echo "Lenguaje principal detectado: $TOP_LANGUAGE"

          # Buscar el color en el archivo languages.yml
          COLOR=$(grep -A 1 "^${TOP_LANGUAGE}:" languages.yml | grep "color:" | awk '{print $2}')
          echo "Color detectado: $COLOR"

          # Exportar el color como salida del paso
          echo "color=$COLOR" >> $GITHUB_ENV

      # Paso 4: Generar la animación de la serpiente con el color detectado
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.actor }}
          outputs: dist/snake.svg?palette=${{ env.color }}

      # Paso 5: Subir la animación generada al branch de salida
      - name: Push Snake Animation
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

