name: Generate snake animation

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{github.actor}}  
          outputs: dist/snake.svg?palette=github-dark

      - name: Get top language
        run: |
          curl -s https://api.github.com/users/JulianHL/repos | jq '.[].language' | sort | uniq -c | sort -nr | head -n 1 | awk '{print $2}' > top_language.txt
          LANGUAGE=$(cat top_language.txt)
          echo "Top language: $LANGUAGE"
        
      - name: Get language color from Shields.io
        run: |
          COLOR=$(curl -s "https://img.shields.io/badge/language-${LANGUAGE}-color?logo=${LANGUAGE}&style=flat-square" | grep -oP '(?<=#)[0-9A-Fa-f]{6}')
          echo "Color for $LANGUAGE is #$COLOR"
        
      - name: Update snake.svg with new color
        run: |
          sed -i "s/--cs:.*;/--cs:#$COLOR;/g" path/to/snake.svg

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

